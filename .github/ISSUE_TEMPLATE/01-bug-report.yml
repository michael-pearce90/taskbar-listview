name: Bug report
description: Report a reproducible defect in suite material or a future release.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        TechTools for Windows is experimental and currently has no implementation runtime or supported Windows builds. Do not use this form for broad customisation or proposal expansion.

        **Do not paste or attach crash dumps, raw process memory, private symbols, PDB files, Microsoft binaries, full system dumps, secrets, tokens, private URLs, credentials, cookies, sessions, or sensitive personal data.**
  - type: dropdown
    id: affected_area
    attributes:
      label: Affected area
      options:
        - Suite documentation
        - Taskbar ListView
        - Browser Choice Tools proposal
        - Documentation
        - Research tooling
        - Future packaged release
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Give a concise, non-sensitive description.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Do not include sensitive files or data.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Project revision or release
      placeholder: Commit hash, branch, or release name
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This concerns suite material or an admitted module boundary, not broad system customisation.
          required: true
        - label: I have not included crash dumps, raw process memory, private symbols, PDB files, Microsoft binaries, full system dumps, secrets, tokens, private URLs, credentials, cookies, sessions, or sensitive personal data.
          required: true
