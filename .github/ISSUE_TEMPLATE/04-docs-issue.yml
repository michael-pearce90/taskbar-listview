name: Documentation issue
description: Report unclear, incorrect, or inconsistent project documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Documentation must keep public claims conservative: experimental, no supported builds yet, future use of private Explorer or taskbar internals, Windows updates may break it, and unsupported builds must fail closed.

        **Do not paste or attach crash dumps, raw process memory, private symbols, PDB files, Microsoft binaries, full system dumps, secrets, tokens, private URLs, or sensitive personal data.**
  - type: input
    id: location
    attributes:
      label: Document and section
      placeholder: README.md, Status
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain what is unclear, incorrect, or inconsistent.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
      description: Keep wording plain and avoid unsupported public claims.
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: This is a documentation issue, not a broad taskbar customisation request.
          required: true
        - label: I have not included crash dumps, raw process memory, private symbols, PDB files, Microsoft binaries, full system dumps, secrets, tokens, private URLs, or sensitive personal data.
          required: true
