name: Feature request
description: Propose a narrow improvement within an admitted module boundary.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        TechTools for Windows is a modular suite, not a general system customisation project. Taskbar ListView is a one-purpose experiment. Browser Choice Tools is proposal only and has no code yet.

        Out of scope for Taskbar ListView: Start menu changes; taskbar styling; taskbar labels; icon size or taskbar position changes; never-combine behaviour; shell replacement features; Windhawk compatibility or mod hosting.

        Browser Choice Tools requests must remain proposal-level, opt-in, transparent, reversible, local-only, and respectful of the user-selected browser and search provider.

        **Do not paste or attach crash dumps, raw process memory, private symbols, PDB files, Microsoft binaries, full system dumps, secrets, tokens, private URLs, credentials, cookies, sessions, or sensitive personal data.**
  - type: textarea
    id: problem
    attributes:
      label: Narrow problem
      description: Describe a problem directly related to an admitted module boundary.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Explain the smallest change that would address the problem.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and support effect
      description: Explain how the proposal preserves fail-closed handling and conservative support claims.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This request is not for broad system customisation or out-of-scope Taskbar ListView behaviour.
          required: true
        - label: I understand that broad customisation requests are out of scope and will be closed.
          required: true
        - label: I have not included crash dumps, raw process memory, private symbols, PDB files, Microsoft binaries, full system dumps, secrets, tokens, private URLs, credentials, cookies, sessions, or sensitive personal data.
          required: true
