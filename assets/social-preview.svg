<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640"
     viewBox="0 0 1280 640" role="img"
     aria-labelledby="title description">
  <title id="title">TechTools for Windows social preview</title>
  <desc id="description">
    Suite title beside conceptual module panels for technician-focused
    open-source tools for Windows.
  </desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#17233b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18"
                    flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="36" fill="url(#background)"/>
  <circle cx="1115" cy="78" r="185" fill="#38bdf8" opacity="0.08"/>
  <circle cx="1040" cy="590" r="250" fill="#818cf8" opacity="0.08"/>

  <g transform="translate(82 102)">
    <rect width="74" height="8" rx="4" fill="#38bdf8"/>
    <text x="0" y="94" fill="#f8fafc"
          font-family="Segoe UI, Arial, sans-serif"
          font-size="62" font-weight="700">TechTools for Windows</text>
    <text x="2" y="153" fill="#cbd5e1"
          font-family="Segoe UI, Arial, sans-serif"
          font-size="29">Technician-focused open-source tools.</text>

    <g transform="translate(2 228)">
      <rect width="392" height="1" fill="#475569"/>
      <text x="0" y="52" fill="#94a3b8"
            font-family="Segoe UI, Arial, sans-serif"
            font-size="21" letter-spacing="2">EXPERIMENTAL SUITE</text>
      <text x="0" y="99" fill="#e2e8f0"
            font-family="Segoe UI, Arial, sans-serif"
            font-size="23">Narrow modules with clear boundaries</text>
    </g>
  </g>

  <g transform="translate(670 94)" filter="url(#shadow)">
    <rect width="518" height="452" rx="28" fill="#111827"
          stroke="#334155" stroke-width="2"/>

    <text x="34" y="48" fill="#64748b"
          font-family="Segoe UI, Arial, sans-serif"
          font-size="17" font-weight="600" letter-spacing="1.5">CURRENT MODULE</text>

    <g transform="translate(34 70)">
      <rect width="138" height="92" rx="12" fill="#1e293b"
            stroke="#475569"/>
      <rect x="13" y="13" width="112" height="45" rx="6" fill="#334155"/>
      <rect x="13" y="70" width="82" height="7" rx="3.5" fill="#64748b"/>

      <rect x="154" width="138" height="92" rx="12" fill="#1e293b"
            stroke="#475569"/>
      <rect x="167" y="13" width="112" height="45" rx="6" fill="#334155"/>
      <rect x="167" y="70" width="75" height="7" rx="3.5" fill="#64748b"/>

      <rect x="308" width="138" height="92" rx="12" fill="#1e293b"
            stroke="#475569"/>
      <rect x="321" y="13" width="112" height="45" rx="6" fill="#334155"/>
      <rect x="321" y="70" width="89" height="7" rx="3.5" fill="#64748b"/>
    </g>

    <g transform="translate(240 184)">
      <path d="M0 0v31m-12-12 12 12 12-12" fill="none"
            stroke="#38bdf8" stroke-width="4" stroke-linecap="round"
            stroke-linejoin="round"/>
    </g>

    <text x="34" y="258" fill="#7dd3fc"
          font-family="Segoe UI, Arial, sans-serif"
          font-size="17" font-weight="600" letter-spacing="1.5">MODULE ROADMAP</text>

    <g transform="translate(34 278)">
      <rect width="450" height="48" rx="10" fill="#1e293b"/>
      <rect x="14" y="14" width="20" height="20" rx="5" fill="#38bdf8"/>
      <text x="50" y="31" fill="#e2e8f0"
            font-family="Segoe UI, Arial, sans-serif"
            font-size="18">Taskbar ListView</text>

      <rect y="58" width="450" height="48" rx="10" fill="#1e293b"/>
      <rect x="14" y="72" width="20" height="20" rx="5" fill="#818cf8"/>
      <text x="50" y="89" fill="#e2e8f0"
            font-family="Segoe UI, Arial, sans-serif"
            font-size="18">Browser Choice Tools proposal</text>

      <rect y="116" width="450" height="48" rx="10" fill="#1e293b"/>
      <rect x="14" y="130" width="20" height="20" rx="5" fill="#34d399"/>
      <text x="50" y="147" fill="#e2e8f0"
            font-family="Segoe UI, Arial, sans-serif"
            font-size="18">Safety model and admission rules</text>
    </g>
  </g>
</svg>
